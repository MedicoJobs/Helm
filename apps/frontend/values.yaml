name: frontend
namespace: medicojobs-prod
replicaCount: 1
revisionHistoryLimit: 5
image:
  repository: 168614391879.dkr.ecr.ap-south-1.amazonaws.com/medicojob-reputation-service
  tag: 8c5d516d1716dba97b0be729e30972dae67bec05
  pullPolicy: IfNotPresent
strategy:
  maxUnavailable: 1
  maxSurge: 0
service:
  type: ClusterIP
  port: 80
  targetPort: 80
envFrom:
  enabled: false
  configMapName: medicojobs-config
  secretName: medicojobs-secrets
probes:
  readiness:
    enabled: true
    type: http
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    enabled: true
    type: http
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
