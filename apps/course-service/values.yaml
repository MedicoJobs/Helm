name: course-service
namespace: medicojobs-prod
replicaCount: 1
revisionHistoryLimit: 5

image:
  repository: 168614391879.dkr.ecr.ap-south-1.amazonaws.com/medicojob-course-service
  tag: latest
  pullPolicy: IfNotPresent

strategy:
  maxUnavailable: 1
  maxSurge: 0

service:
  type: ClusterIP
  port: 5007
  targetPort: 5007

envFrom:
  enabled: true
  configMapName: medicojobs-config
  secretName: medicojobs-secrets

probes:
  readiness:
    enabled: true
    type: tcp
    path: /health
    initialDelaySeconds: null
    periodSeconds: 10
  liveness:
    enabled: true
    type: tcp
    path: /health
    initialDelaySeconds: null
    periodSeconds: 20

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 768Mi
