apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/part-of: medicojobs-platform
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.strategy.maxUnavailable }}
      maxSurge: {{ .Values.strategy.maxSurge }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
      app.kubernetes.io/part-of: medicojobs-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/part-of: medicojobs-platform
    spec:
{{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
{{- end }}
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
{{- if .Values.env }}
          env:
{{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- end }}
{{- if .Values.envFrom.enabled }}
          envFrom:
            - configMapRef:
                name: {{ .Values.envFrom.configMapName }}
            - secretRef:
                name: {{ .Values.envFrom.secretName }}
                optional: true
{{- end }}
{{- if .Values.probes.readiness.enabled }}
          readinessProbe:
{{- if eq .Values.probes.readiness.type "http" }}
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.targetPort }}
{{- else }}
            tcpSocket:
              port: {{ .Values.service.targetPort }}
{{- end }}
{{- if .Values.probes.readiness.initialDelaySeconds }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
{{- end }}
{{- if .Values.probes.readiness.periodSeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
{{- end }}
{{- end }}
{{- if .Values.probes.liveness.enabled }}
          livenessProbe:
{{- if eq .Values.probes.liveness.type "http" }}
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.service.targetPort }}
{{- else }}
            tcpSocket:
              port: {{ .Values.service.targetPort }}
{{- end }}
{{- if .Values.probes.liveness.initialDelaySeconds }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
{{- end }}
{{- if .Values.probes.liveness.periodSeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
{{- end }}
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
