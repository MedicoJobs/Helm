name: availability-service
namespace: medicojobs-prod
replicaCount: 1
revisionHistoryLimit: 5
image:
  repository: 194418667391.dkr.ecr.ap-south-1.amazonaws.com/medicojob-availability-service
  tag: be3ac9bdcfb67e8f661fea04aa3b9be18155a218
  pullPolicy: IfNotPresent
strategy:
  maxUnavailable: 1
  maxSurge: 0
service:
  type: ClusterIP
  port: 5004
  targetPort: 5004
envFrom:
  enabled: true
  configMapName: medicojobs-config
  secretName: medicojobs-secrets
env:
  PORT: "5004"
  DYNAMODB_AVAILABILITY_TABLE: medicojobs-availability
serviceAccount:
  create: true
  name: availability-service
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::194418667391:role/medicojobs-cluster-workload-irsa
probes:
  readiness:
    enabled: true
    type: tcp
    path: /health
    initialDelaySeconds: null
    periodSeconds: 10
  liveness:
    enabled: true
    type: tcp
    path: /health
    initialDelaySeconds: null
    periodSeconds: 20
resources:
  requests:
    cpu: 75m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
