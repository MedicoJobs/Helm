name: resume-service
namespace: medicojobs-prod
replicaCount: 1
revisionHistoryLimit: 5
image:
  repository: 168614391879.dkr.ecr.ap-south-1.amazonaws.com/medicojob-resume-service
  tag: 7d2ca6587de6d8d2f8d5b2fc79fe782fe67a00bf
  pullPolicy: IfNotPresent
strategy:
  maxUnavailable: 1
  maxSurge: 0
service:
  type: ClusterIP
  port: 5008
  targetPort: 5008
serviceAccount:
  create: true
  name: resume-service
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::168614391879:role/medicojobs-cluster-workload-irsa
env:
  ENABLE_S3_UPLOAD: "true"
  ENABLE_LLM: "true"
  ENABLE_OPENSEARCH_INDEXING: "false"
  PERSIST_RESUME_ANALYSIS: "false"
  S3_BUCKET: "medicojobs-cluster-uploads-168614391879"
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/medicojobs_resume"
envFrom:
  enabled: true
  configMapName: medicojobs-config
  secretName: medicojobs-secrets
probes:
  readiness:
    enabled: true
    type: http
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 10
  liveness:
    enabled: true
    type: http
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 20
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1500m
    memory: 2Gi
