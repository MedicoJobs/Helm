name: api-gateway
namespace: medicojobs-prod
replicaCount: 1
revisionHistoryLimit: 5
image:
  repository: 194418667391.dkr.ecr.ap-south-1.amazonaws.com/medicojob-api-gateway
  tag: 25018443634b749ba8684ca53be11357c5b39547
  pullPolicy: IfNotPresent
strategy:
  maxUnavailable: 1
  maxSurge: 0
service:
  type: ClusterIP
  port: 5000
  targetPort: 5000
envFrom:
  enabled: true
  configMapName: medicojobs-config
  secretName: medicojobs-secrets
probes:
  readiness:
    enabled: true
    type: http
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    enabled: true
    type: http
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
