namespace:
  name: medicojobs-prod

config:
  NODE_ENV: production
  PORT: "5000"
  USER_SERVICE_URL: http://user-service:5001
  JOB_SERVICE_URL: http://job-service:5002
  MATCHING_SERVICE_URL: http://matching-service:5003
  AVAILABILITY_SERVICE_URL: http://availability-service:5004
  LOCATION_SERVICE_URL: http://location-service:5005
  REPUTATION_SERVICE_URL: http://reputation-service:5006
  COURSE_SERVICE_URL: http://course-service:5007
  RESUME_SERVICE_URL: http://resume-service:5008
  AWS_REGION: ap-south-1

ingress:
  enabled: true
  name: medicojobs-alb
  host: medicojobs.online
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/group.name: medicojobs
    external-dns.alpha.kubernetes.io/hostname: medicojobs.online
  paths:
    - path: /api
      serviceName: api-gateway
      servicePort: 5000
    - path: /auth
      serviceName: api-gateway
      servicePort: 5000
    - path: /jobs
      serviceName: api-gateway
      servicePort: 5000
    - path: /availability
      serviceName: api-gateway
      servicePort: 5000
    - path: /socket.io
      serviceName: api-gateway
      servicePort: 5000
    - path: /
      serviceName: frontend
      servicePort: 80

hpa:
  apiGateway:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    averageUtilization: 65
  frontend:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    averageUtilization: 65

pdb:
  apiGateway:
    enabled: true
    minAvailable: 1
  frontend:
    enabled: true
    minAvailable: 1
